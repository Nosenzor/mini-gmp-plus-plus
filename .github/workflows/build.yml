name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os_name }} / ${{ matrix.variant_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: Linux
            variant_name: SIMD
            simd: ON
          - os: ubuntu-latest
            os_name: Linux
            variant_name: non-SIMD
            simd: OFF
          - os: macos-latest
            os_name: macOS
            variant_name: SIMD
            simd: ON
          - os: macos-latest
            os_name: macOS
            variant_name: non-SIMD
            simd: OFF
          - os: windows-latest
            os_name: Windows
            variant_name: SIMD
            simd: ON
          - os: windows-latest
            os_name: Windows
            variant_name: non-SIMD
            simd: OFF

    env:
      BUILD_DIR: build
      BUILD_CONFIG: Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          packages=(libgmp-dev pkg-config)
          if [ "${{ matrix.simd }}" = "ON" ]; then
            packages+=(libxsimd-dev)
          fi
          sudo apt-get install -y "${packages[@]}"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          packages=(gmp pkgconf)
          if [ "${{ matrix.simd }}" = "ON" ]; then
            packages+=(xsimd)
          fi
          brew install "${packages[@]}"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          git clone https://github.com/microsoft/vcpkg $vcpkgRoot --depth=1
          & "$vcpkgRoot\bootstrap-vcpkg.bat"

          $packages = 'gmp', 'pkgconf'
          if ('${{ matrix.simd }}' -ieq 'ON') {
            $packages += 'xsimd'
          }

          & "$vcpkgRoot\vcpkg.exe" install $packages --triplet x64-windows
          if ($LASTEXITCODE -ne 0) {
            Write-Error "vcpkg install failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          "$vcpkgRoot\installed\x64-windows\tools\pkgconf" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "${{ github.workspace }}\build\${{ env.BUILD_CONFIG }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PKG_CONFIG_PATH=$vcpkgRoot\installed\x64-windows\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        run: >-
          cmake -S . -B "${{ env.BUILD_DIR }}"
          -DCMAKE_BUILD_TYPE="${{ env.BUILD_CONFIG }}"
          -DMINI_GMP_ENABLE_SIMD="${{ matrix.simd }}"
          -DMINI_GMP_PLUS_WITH_TESTS=1

      - name: Build
        run: cmake --build "${{ env.BUILD_DIR }}" --config "${{ env.BUILD_CONFIG }}" --parallel

      - name: Test
        run: ctest --test-dir "${{ env.BUILD_DIR }}" --output-on-failure -C "${{ env.BUILD_CONFIG }}"
