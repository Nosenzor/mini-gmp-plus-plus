name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  release:
    name: release / ${{ matrix.os_name }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  os_name: Linux,   preset: release-tests,        simd: ON  }
          - { os: ubuntu-latest,  os_name: Linux,   preset: release-nosimd-tests, simd: OFF }
          - { os: macos-latest,   os_name: macOS,   preset: release-tests,        simd: ON  }
          - { os: macos-latest,   os_name: macOS,   preset: release-nosimd-tests, simd: OFF }
          - { os: windows-latest, os_name: Windows, preset: release-tests,        simd: ON  }
          - { os: windows-latest, os_name: Windows, preset: release-nosimd-tests, simd: OFF }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          packages=(libgmp-dev pkg-config)
          if [ "${{ matrix.simd }}" = "ON" ]; then packages+=(libxsimd-dev); fi
          sudo apt-get install -y "${packages[@]}"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          packages=(gmp pkgconf)
          if [ "${{ matrix.simd }}" = "ON" ]; then packages+=(xsimd); fi
          brew install "${packages[@]}"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          $vcpkgInstalled = Join-Path $vcpkgRoot 'installed\x64-windows'

          git clone https://github.com/microsoft/vcpkg $vcpkgRoot --depth=1
          & "$vcpkgRoot\bootstrap-vcpkg.bat"

          $packages = 'gmp', 'pkgconf'
          if ('${{ matrix.simd }}' -ieq 'ON') {
            $packages += 'xsimd'
          }

          Push-Location $vcpkgRoot
          & "$vcpkgRoot\vcpkg.exe" install $packages --triplet x64-windows
          $exitCode = $LASTEXITCODE
          Pop-Location

          if ($exitCode -ne 0) {
            Write-Error "vcpkg install failed with exit code $exitCode"
            exit $exitCode
          }

          "$vcpkgInstalled\tools\pkgconf" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$vcpkgInstalled\bin"           | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PKG_CONFIG_PATH=$vcpkgInstalled\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$vcpkgInstalled"             | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Add build output to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "${{ github.workspace }}\builds\${{ matrix.preset }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  sanitize:
    name: sanitize / ${{ matrix.preset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { preset: asan,              simd: ON  }
          - { preset: ubsan,             simd: ON  }
          - { preset: asan-ubsan,        simd: ON  }
          - { preset: tsan,              simd: ON  }
          - { preset: asan-nosimd,       simd: OFF }
          - { preset: ubsan-nosimd,      simd: OFF }
          - { preset: asan-ubsan-nosimd, simd: OFF }
          - { preset: tsan-nosimd,       simd: OFF }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          packages=(libgmp-dev pkg-config)
          if [ "${{ matrix.simd }}" = "ON" ]; then packages+=(libxsimd-dev); fi
          sudo apt-get install -y "${packages[@]}"

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DMINI_GMP_PLUS_WITH_TESTS=1

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure
